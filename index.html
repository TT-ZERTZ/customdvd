<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: black; overflow: hidden; width: 100vw; height: 100vh; }
    .photo {
      position: absolute;
      width: 150px;
      height: 150px;
      object-fit: cover;
      display: none;
      border-radius: 50%; /* Optional: Makes the bounding boxes round to match circular collision physics */
    }
  </style>
</head>
<body>

  <img class="photo" src="photo1.jpg">
  <img class="photo" src="photo2.jpg">

  <script>
    const SIZE = 150;
    const SPEED = 3;

    const imgs = Array.from(document.querySelectorAll('.photo'));
    const balls = [];

    imgs.forEach((img) => {
      img.onload = () => {
        img.style.display = 'block';
        balls.push({
          el: img,
          x: Math.random() * (window.innerWidth  - SIZE),
          y: Math.random() * (window.innerHeight - SIZE),
          dx: (Math.random() < 0.5 ? 1 : -1) * (SPEED + Math.random() * 2),
          dy: (Math.random() < 0.5 ? 1 : -1) * (SPEED + Math.random() * 2),
        });
      };
      img.onerror = () => { img.remove(); };
      
      // If image is already cached/loaded instantly
      if (img.complete && img.naturalWidth !== 0) {
        img.onload();
      }
    });

    function collide(a, b) {
      const ax = a.x + SIZE/2, ay = a.y + SIZE/2;
      const bx = b.x + SIZE/2, by = b.y + SIZE/2;
      const dist = Math.sqrt((ax-bx)**2 + (ay-by)**2);
      if (dist < SIZE && dist > 0) {
        // Swap velocities (simple elastic collision)
        [a.dx, b.dx] = [b.dx, a.dx];
        [a.dy, b.dy] = [b.dy, a.dy];

        // Push apart so they don't stick together
        const overlap = SIZE - dist;
        const nx = (ax - bx) / dist;
        const ny = (ay - by) / dist;
        a.x += nx * overlap / 2;
        a.y += ny * overlap / 2;
        b.x -= nx * overlap / 2;
        b.y -= ny * overlap / 2;
      }
    }

    function loop() {
      const W = window.innerWidth;
      const H = window.innerHeight;

      for (const b of balls) {
        b.x += b.dx;
        b.y += b.dy;

        if (b.x + SIZE >= W) { b.x = W - SIZE; b.dx = -Math.abs(b.dx); }
        if (b.x <= 0)        { b.x = 0;        b.dx =  Math.abs(b.dx); }
        if (b.y + SIZE >= H) { b.y = H - SIZE;  b.dy = -Math.abs(b.dy); }
        if (b.y <= 0)        { b.y = 0;         b.dy =  Math.abs(b.dy); }

        b.el.style.left = b.x + 'px';
        b.el.style.top  = b.y + 'px';
      }

      // Check collision between the two balls
      if (balls.length >= 2) {
        collide(balls[0], balls[1]);
      }

      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
